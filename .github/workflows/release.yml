name: Package and release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*-*'

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
      CF_API_KEY: ${{ secrets.CF_API_KEY }}

    steps:

      - name: Clone project
        uses: actions/checkout@v3

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.1
        
      - name: Rename .toc file
        run: mv '!dev_MyBags.toc' MyBags.toc

      - name: Add .toc file to Git
        run: git add MyBags.toc

      - name: Generate query help lua
        run: lua tools/generate_query_help.lua

      - name: Verify generated query help is up to date
        run: |
          if ! git diff --quiet -- generated/queryHelpDocs.lua; then
            echo "generated/queryHelpDocs.lua is out of date with QUERY_ATTRIBUTES.md"
            git --no-pager diff -- generated/queryHelpDocs.lua
            exit 1
          fi

      - name: Run tests
        run: |
          lua tests/categories_test.lua
          lua tests/Categorizers/query_test.lua
          lua tests/integration/persistence/savedvariable_test.lua

      - name: Remove tests directory
        run: rm -rf tests

      - name: Remove tools directory
        run: rm -rf tools

      - name: Remove disallowed markdown files
        run: find . -type f -name '*.md' ! -name 'README.md' ! -name 'QUERY_ATTRIBUTES.md' ! -name 'RELEASE_NOTES.md' -delete

      - name: Verify markdown whitelist
        run: |
          disallowed_markdown_files="$(find . -type f -name '*.md' ! -name 'README.md' ! -name 'QUERY_ATTRIBUTES.md' ! -name 'RELEASE_NOTES.md')"
          if [ -n "$disallowed_markdown_files" ]; then
            echo "Disallowed markdown files found:"
            echo "$disallowed_markdown_files"
            exit 1
          fi

      - name: Package and release
        uses: BigWigsMods/packager@v2
        with:
          args: -p 1467794
