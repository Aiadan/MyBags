name: Package and release

# we need to let GitHub know _when_ we want to release, typically only when we create a new tag.
# this will target only tags
on:
  push:
    tags:
      - '**'

jobs:
  release:
    runs-on: ubuntu-latest

    # specify the environment variables used by the packager, matching the secrets from the project on GitHub
    env:
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}  # "GITHUB_TOKEN" is a secret always provided to the workflow


    # "steps" holds a list of all the steps needed to package and release our AddOn
    steps:

      # we first have to clone the AddOn project, this is a required step
      - name: Clone project
        uses: actions/checkout@v3

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.1
        
      - name: Rename .toc file
        run: mv '!dev_MyBags.toc' MyBags.toc

      - name: Add .toc file to Git #workaround for the package to accept this file and not ignore it
        run: git add MyBags.toc

      - name: Generate query help lua
        run: lua tools/generate_query_help.lua

      - name: Verify generated query help is up to date
        run: |
          if ! git diff --quiet -- generated/queryHelpDocs.lua; then
            echo "generated/queryHelpDocs.lua is out of date with QUERY_ATTRIBUTES.md"
            git --no-pager diff -- generated/queryHelpDocs.lua
            exit 1
          fi

      - name: Run tests
        run: lua tests/Categorizers/query_test.lua

      - name: Remove tests directory
        run: rm -rf tests

      - name: Remove tools directory
        run: rm -rf tools

      - name: Remove disallowed markdown files
        run: find . -type f -name '*.md' ! -name 'README.md' ! -name 'QUERY_ATTRIBUTES.md' -delete

      - name: Verify markdown whitelist
        run: |
          disallowed_markdown_files="$(find . -type f -name '*.md' ! -name 'README.md' ! -name 'QUERY_ATTRIBUTES.md')"
          if [ -n "$disallowed_markdown_files" ]; then
            echo "Disallowed markdown files found:"
            echo "$disallowed_markdown_files"
            exit 1
          fi

      # once cloned, we just run the GitHub Action for the packager project
      - name: Package and release
        uses: BigWigsMods/packager@v2
